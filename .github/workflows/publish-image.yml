name: Publish image

# Builds the API Docker image and publishes it so a server can pull + deploy it.
#
# Primary registry: GitHub Container Registry (ghcr.io) — reliable, needs no
# extra secrets (uses the built-in GITHUB_TOKEN). The old registry
# (docker.netixsystem.com, behind ArvanCloud) is kept only as a BEST-EFFORT
# mirror: it flaps with 502s, so it can never fail the publish.
#
#  - push to `main`      → tags `latest` and `sha-<short-sha>`
#  - push a tag `v1.2.3` → tags `1.2.3`, `1.2`, `1` (and `latest`)
#  - manual run          → tags `latest` (+ sha)
#
# Optional repo variable IMAGE_NAME overrides the mirror image path. To turn the
# mirror off entirely, set the repo variable MIRROR_ENABLED to "false".

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  # Primary: GitHub Container Registry.
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/accounting-assistant-api
  # Best-effort legacy mirror (docker.netixsystem.com behind ArvanCloud).
  MIRROR_REGISTRY: docker.netixsystem.com
  MIRROR_IMAGE: ${{ vars.IMAGE_NAME || 'docker.netixsystem.com/accounting-assistant-api' }}

jobs:
  build-push:
    name: Build & push API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to ghcr.io for this repo's owner
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Log in to the legacy mirror only when credentials are configured (it
      # accepts anonymous push today, so this no-ops by default).
      - name: Log in to the mirror registry (if credentials are set)
        env:
          REG_USER: ${{ secrets.REGISTRY_USERNAME }}
          REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -n "$REG_USER" ]; then
            echo "$REG_PASS" | docker login "$MIRROR_REGISTRY" -u "$REG_USER" --password-stdin
          else
            echo "No REGISTRY_USERNAME configured — mirror push is anonymous."
          fi

      - name: Derive image tags & labels (ghcr)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=accounting-assistant-api
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # Expose the GitHub Actions cache backend to a raw `docker buildx build`.
      - name: Expose Actions cache to buildx
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Required push → GHCR. Retry a few times for transient registry 5xx; the
      # GHA layer cache makes retries fast.
      - name: Build & push to GHCR
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          set -u
          args=()
          while IFS= read -r t; do [ -n "$t" ] && args+=(--tag "$t"); done <<< "$TAGS"
          while IFS= read -r l; do [ -n "$l" ] && args+=(--label "$l"); done <<< "$LABELS"
          for attempt in 1 2 3; do
            echo "::group::GHCR push attempt $attempt / 3"
            if docker buildx build --push "${args[@]}" \
                 --cache-from type=gha --cache-to type=gha,mode=max . ; then
              echo "::endgroup::"; echo "✓ pushed to GHCR on attempt $attempt"; exit 0
            fi
            echo "::endgroup::"; echo "✗ attempt $attempt failed; retrying in 20s…"; sleep 20
          done
          echo "::error::GHCR push failed after 3 attempts"; exit 1

      # Best-effort mirror to the legacy registry. Copies the manifest+blobs
      # from GHCR (fast, no rebuild). NEVER fails the job — if ArvanCloud is
      # down it's simply skipped.
      - name: Mirror to legacy registry (best-effort)
        if: ${{ vars.MIRROR_ENABLED != 'false' }}
        continue-on-error: true
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -u
          src=""
          createargs=()
          while IFS= read -r t; do
            [ -n "$t" ] || continue
            [ -z "$src" ] && src="$t"
            mt="${t/${GHCR_IMAGE}/${MIRROR_IMAGE}}"
            createargs+=(--tag "$mt")
          done <<< "$TAGS"
          if [ -n "$src" ]; then
            for attempt in 1 2 3; do
              if docker buildx imagetools create "${createargs[@]}" "$src"; then
                echo "✓ mirrored to $MIRROR_REGISTRY on attempt $attempt"; exit 0
              fi
              echo "mirror attempt $attempt failed; retrying in 20s…"; sleep 20
            done
            echo "::warning::mirror to $MIRROR_REGISTRY skipped (registry unavailable)"
          fi

      - name: Summary
        run: |
          {
            echo "### Published to GHCR"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Zero-touch deploy is handled server-side by Watchtower (see
  # docker-compose.prod.yml + DEPLOY.md). Point the server's API_IMAGE at the
  # GHCR image to drop the ArvanCloud registry from the deploy path entirely.
