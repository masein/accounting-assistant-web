name: Publish image

# Builds the API Docker image and pushes it to the private registry
# (docker.netixsystem.com) so it can be pulled and deployed on a server.
#
#  - push to `main`      → tags `latest` and `sha-<short-sha>`
#  - push a tag `v1.2.3` → tags `1.2.3`, `1.2`, `1` (and `latest`)
#  - manual run          → tags `latest` (+ sha)
#
# The registry (docker.netixsystem.com) currently accepts anonymous push, so no
# credentials are needed. If you later put it behind auth, add these secrets and
# the login step below runs automatically:
#   REGISTRY_USERNAME  – login for docker.netixsystem.com
#   REGISTRY_PASSWORD  – password / token for that user
# Optional repo variable:
#   IMAGE_NAME         – override the default image path (see env below)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: docker.netixsystem.com
  # Default image path. If your registry needs a project/namespace (e.g. Harbor
  # → docker.netixsystem.com/<project>/accounting-assistant-api), set the
  # IMAGE_NAME repo variable to the full path instead.
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'docker.netixsystem.com/accounting-assistant-api' }}

jobs:
  build-push:
    name: Build & push API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in only when credentials are configured. The registry allows
      # anonymous push today, so this no-ops by default. (The check is done in
      # the shell — the `secrets` context can't be used in a step `if:`.)
      - name: Log in to the registry (if credentials are set)
        env:
          REG_USER: ${{ secrets.REGISTRY_USERNAME }}
          REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -n "$REG_USER" ]; then
            echo "$REG_PASS" | docker login "$REGISTRY" -u "$REG_USER" --password-stdin
          else
            echo "No REGISTRY_USERNAME configured — pushing anonymously to $REGISTRY."
          fi

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=accounting-assistant-api
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # Expose the GitHub Actions cache backend to a raw `docker buildx build`
      # (build-push-action wires this up for you; the retry loop below doesn't).
      - name: Expose Actions cache to buildx
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # The registry (docker.netixsystem.com) sits behind ArvanCloud, which
      # intermittently returns 502 Bad Gateway on blob HEAD/push. The build is
      # fine — only the push flaps — so retry the push a few times before
      # failing. The GHA layer cache means retries re-use built layers and are
      # fast. This makes publishes self-heal instead of needing manual reruns.
      - name: Build & push (retry transient registry 5xx)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          set -u
          args=()
          while IFS= read -r t; do [ -n "$t" ] && args+=(--tag "$t"); done <<< "$TAGS"
          while IFS= read -r l; do [ -n "$l" ] && args+=(--label "$l"); done <<< "$LABELS"
          for attempt in 1 2 3 4 5; do
            echo "::group::push attempt $attempt / 5"
            if docker buildx build \
                 --push \
                 "${args[@]}" \
                 --cache-from type=gha \
                 --cache-to type=gha,mode=max \
                 . ; then
              echo "::endgroup::"
              echo "✓ pushed on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "✗ attempt $attempt failed (likely a transient registry 5xx via ArvanCloud); retrying in 25s…"
            sleep 25
          done
          echo "::error::registry push failed after 5 attempts"
          exit 1

      - name: Summary
        run: |
          echo "### Pushed image tags" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # Zero-touch deploy is handled server-side by Watchtower (see
  # docker-compose.prod.yml + DEPLOY.md), because GitHub's cloud runners can't
  # reach the server's SSH. Watchtower on the server polls the registry and
  # redeploys the api container when this workflow publishes a new image — no
  # inbound access from GitHub required.
