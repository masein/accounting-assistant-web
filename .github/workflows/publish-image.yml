name: Publish image

# Builds the API Docker image and pushes it to the private registry
# (docker.netixsystem.com) so it can be pulled and deployed on a server.
#
#  - push to `main`      → tags `latest` and `sha-<short-sha>`
#  - push a tag `v1.2.3` → tags `1.2.3`, `1.2`, `1` (and `latest`)
#  - manual run          → tags `latest` (+ sha)
#
# The registry (docker.netixsystem.com) currently accepts anonymous push, so no
# credentials are needed. If you later put it behind auth, add these secrets and
# the login step below runs automatically:
#   REGISTRY_USERNAME  – login for docker.netixsystem.com
#   REGISTRY_PASSWORD  – password / token for that user
# Optional repo variable:
#   IMAGE_NAME         – override the default image path (see env below)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: docker.netixsystem.com
  # Default image path. If your registry needs a project/namespace (e.g. Harbor
  # → docker.netixsystem.com/<project>/accounting-assistant-api), set the
  # IMAGE_NAME repo variable to the full path instead.
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'docker.netixsystem.com/accounting-assistant-api' }}

jobs:
  build-push:
    name: Build & push API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in only when credentials are configured. The registry allows
      # anonymous push today, so this no-ops by default. (The check is done in
      # the shell — the `secrets` context can't be used in a step `if:`.)
      - name: Log in to the registry (if credentials are set)
        env:
          REG_USER: ${{ secrets.REGISTRY_USERNAME }}
          REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -n "$REG_USER" ]; then
            echo "$REG_PASS" | docker login "$REGISTRY" -u "$REG_USER" --password-stdin
          else
            echo "No REGISTRY_USERNAME configured — pushing anonymously to $REGISTRY."
          fi

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=accounting-assistant-api
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache so repeat builds skip apt/pip.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Pushed image tags" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ── Zero-touch deploy ──────────────────────────────────────────────────────
  # Runs after a successful image push. OFF by default: it only runs when the
  # repo variable DEPLOY_ENABLED == 'true'. SSHes into the server, syncs the
  # prod compose file, and does `compose pull && up -d` so the new image goes
  # live. Required secrets (Settings → Secrets and variables → Actions):
  #   DEPLOY_HOST      – server hostname / IP
  #   DEPLOY_USER      – SSH user (must be able to run docker)
  #   DEPLOY_SSH_KEY   – that user's PRIVATE key (PEM, full contents)
  #   DEPLOY_PATH      – dir on the server holding the `.env` (compose is scp'd here)
  #   DEPLOY_PORT      – optional, defaults to 22
  deploy:
    name: Deploy to server
    needs: build-push
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Deploy over SSH (compose pull && up -d)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::warning::DEPLOY_ENABLED is true but DEPLOY_HOST/DEPLOY_SSH_KEY are not set — skipping deploy."
            exit 0
          fi
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSHOPTS="-i $HOME/.ssh/id_deploy -o StrictHostKeyChecking=accept-new"
          # Keep the server's compose file in sync (it holds no secrets; .env is untouched).
          scp $SSHOPTS -P "$PORT" docker-compose.prod.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.prod.yml"
          ssh $SSHOPTS -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' \
             && docker compose -f docker-compose.prod.yml pull \
             && docker compose -f docker-compose.prod.yml up -d \
             && docker image prune -f"
          echo "Deployed to $DEPLOY_HOST:$DEPLOY_PATH"
