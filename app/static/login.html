<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounting Assistant - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" media="print" onload="this.media='all'">
  <style>
    :root {
      --bg: radial-gradient(circle at 15% 10%, #e8f6f2 0%, #ecf4fb 40%, #e7eef7 100%);
      --card: rgba(255,255,255,0.92);
      --border: #d6e2ee;
      --text: #1b2b45;
      --muted: #4e6480;
      --primary: #0f766e;
      --primary-hover: #0b5f58;
      --danger-bg: #fee2e2;
      --danger: #991b1b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 1rem;
    }
    .card {
      width: min(420px, 96vw);
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      backdrop-filter: blur(8px);
      padding: 1.4rem;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }
    h1 { margin: 0 0 0.4rem 0; font-size: 1.45rem; color: var(--primary); }
    p { margin: 0 0 1.1rem 0; color: var(--muted); }
    label { display: block; font-weight: 600; margin-bottom: 0.35rem; color: var(--muted); }
    input {
      width: 100%;
      padding: 0.65rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 0.85rem;
    }
    .pw-wrap { position: relative; }
    .pw-wrap > input { padding-inline-end: 2.6rem; }
    .pw-toggle {
      position: absolute; inset-inline-end: 0.5rem; top: 0.65rem;
      width: auto; margin: 0; padding: 0.2rem; border: none; background: transparent;
      cursor: pointer; color: var(--text-muted, #64748b); display: inline-flex; align-items: center;
    }
    .pw-toggle:hover { color: var(--primary); }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.2);
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 0.7rem;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      transition: background 150ms ease;
    }
    button:hover { background: var(--primary-hover); }
    .error {
      margin-top: 0.8rem;
      padding: 0.65rem 0.8rem;
      border-radius: 10px;
      border: 1px solid #fca5a5;
      background: var(--danger-bg);
      color: var(--danger);
      display: none;
    }
    .hint { font-size: 0.84rem; color: var(--muted); margin-top: 0.85rem; }
    .lang-row { margin-bottom: 0.75rem; }
    .lang-row label { margin: 0 0 0.35rem 0; min-width: 74px; }
    .lang-pills {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.4rem;
    }
    .lang-pill {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.45rem 0.35rem;
      background: #fff;
      color: var(--text);
      font-size: 0.86rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      cursor: pointer;
      transition: border-color 150ms ease, transform 150ms ease, box-shadow 150ms ease;
    }
    .lang-pill:hover { transform: translateY(-1px); box-shadow: 0 8px 16px rgba(15,23,42,0.08); }
    .lang-pill.active { border-color: var(--primary); background: #e6fffb; color: #0b5f58; }
    .lang-pill .flag { font-size: 1rem; line-height: 1; }
    html[lang="fa"] body,
    html[lang="fa"] input,
    html[lang="fa"] button,
    html[lang="fa"] .lang-pill {
      font-family: 'Vazirmatn', 'Tahoma', 'Segoe UI', sans-serif;
    }
    html[lang="ar"] body,
    html[lang="ar"] input,
    html[lang="ar"] button,
    html[lang="ar"] .lang-pill {
      font-family: 'Tajawal', 'Noto Naskh Arabic', 'Tahoma', sans-serif;
    }
  </style>
</head>
<body>
  <form class="card" id="login-form">
    <h1 id="login-title">Accounting Assistant</h1>
    <p id="login-subtitle">Sign in to access transactions, reports, and settings.</p>

    <div class="lang-row">
      <label id="login-language-label">Language</label>
      <div class="lang-pills" id="lang-pills">
        <button type="button" class="lang-pill" data-lang="en"><span class="flag">🇺🇸</span><span>EN</span></button>
        <button type="button" class="lang-pill" data-lang="fa"><span class="flag">🇮🇷</span><span>FA</span></button>
        <button type="button" class="lang-pill" data-lang="es"><span class="flag">🇪🇸</span><span>ES</span></button>
        <button type="button" class="lang-pill" data-lang="ar"><span class="flag">🇸🇦</span><span>AR</span></button>
      </div>
    </div>

    <label for="username" id="username-label">Username</label>
    <input id="username" name="username" autocomplete="username" required>

    <label for="password" id="password-label">Password</label>
    <div class="pw-wrap">
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password" aria-pressed="false">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <button type="submit" id="submit-btn">Login</button>
    <div class="error" id="error-box"></div>
    <div class="hint"><span id="default-admin-label">Default admin credentials:</span> <strong>admin / admin</strong></div>
  </form>

  <script>
    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorBox = document.getElementById('error-box');
    const langPills = document.getElementById('lang-pills');
    const SUPPORTED_UI_LANGUAGES = ['en', 'fa', 'es', 'ar'];
    const RTL_LANGUAGES = new Set(['fa', 'ar']);
    let currentLanguage = 'en';
    const I18N = {
      en: {
        title: 'Accounting Assistant',
        subtitle: 'Sign in to access transactions, reports, and settings.',
        language: 'Language',
        username: 'Username',
        password: 'Password',
        showPassword: 'Show password',
        hidePassword: 'Hide password',
        login: 'Login',
        signingIn: 'Signing in...',
        defaultAdmin: 'Default admin credentials:',
        required: 'Username and password are required.',
        failed: 'Login failed.',
        connectionError: 'Connection error',
      },
      fa: {
        title: 'دستیار حسابداری',
        subtitle: 'برای دسترسی به اسناد، گزارش‌ها و تنظیمات وارد شوید.',
        language: 'زبان',
        username: 'نام کاربری',
        password: 'رمز عبور',
        showPassword: 'نمایش رمز',
        hidePassword: 'پنهان کردن رمز',
        login: 'ورود',
        signingIn: 'در حال ورود...',
        defaultAdmin: 'کاربر پیش‌فرض ادمین:',
        required: 'نام کاربری و رمز عبور الزامی است.',
        failed: 'ورود ناموفق بود.',
        connectionError: 'خطای اتصال',
      },
      es: {
        title: 'Asistente Contable',
        subtitle: 'Inicia sesión para acceder a transacciones, reportes y configuración.',
        language: 'Idioma',
        username: 'Usuario',
        password: 'Contraseña',
        showPassword: 'Mostrar contraseña',
        hidePassword: 'Ocultar contraseña',
        login: 'Entrar',
        signingIn: 'Ingresando...',
        defaultAdmin: 'Credenciales de admin por defecto:',
        required: 'Usuario y contraseña son obligatorios.',
        failed: 'Error de inicio de sesión.',
        connectionError: 'Error de conexión',
      },
      ar: {
        title: 'مساعد المحاسبة',
        subtitle: 'سجل الدخول للوصول إلى القيود والتقارير والإعدادات.',
        language: 'اللغة',
        username: 'اسم المستخدم',
        password: 'كلمة المرور',
        showPassword: 'إظهار كلمة المرور',
        hidePassword: 'إخفاء كلمة المرور',
        login: 'تسجيل الدخول',
        signingIn: 'جارٍ تسجيل الدخول...',
        defaultAdmin: 'بيانات المدير الافتراضية:',
        required: 'اسم المستخدم وكلمة المرور مطلوبان.',
        failed: 'فشل تسجيل الدخول.',
        connectionError: 'خطأ في الاتصال',
      },
    };

    function t(key) {
      const dict = I18N[currentLanguage] || I18N.en;
      return dict[key] || I18N.en[key] || key;
    }

    function applyLanguage(lang, persist = true) {
      const nextLang = SUPPORTED_UI_LANGUAGES.includes(lang) ? lang : 'en';
      currentLanguage = nextLang;
      if (persist) localStorage.setItem('aa_ui_language', nextLang);
      document.documentElement.lang = nextLang;
      document.documentElement.dir = RTL_LANGUAGES.has(nextLang) ? 'rtl' : 'ltr';
      document.querySelectorAll('.lang-pill').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === nextLang);
      });
      document.getElementById('login-title').textContent = t('title');
      document.getElementById('login-subtitle').textContent = t('subtitle');
      document.getElementById('login-language-label').textContent = t('language');
      document.getElementById('username-label').textContent = t('username');
      document.getElementById('password-label').textContent = t('password');
      document.getElementById('default-admin-label').textContent = t('defaultAdmin');
      submitBtn.textContent = t('login');
      const pwBtn = document.getElementById('pw-toggle');
      const pwInput = document.getElementById('password');
      if (pwBtn && pwInput) {
        pwBtn.setAttribute('aria-label', t(pwInput.type === 'password' ? 'showPassword' : 'hidePassword'));
      }
    }

    // Password show/hide toggle.
    (function () {
      const btn = document.getElementById('pw-toggle');
      const input = document.getElementById('password');
      if (!btn || !input) return;
      const EYE = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      const EYE_OFF = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      btn.addEventListener('click', function () {
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.setAttribute('aria-pressed', show ? 'true' : 'false');
        btn.setAttribute('aria-label', t(show ? 'hidePassword' : 'showPassword'));
        btn.innerHTML = show ? EYE_OFF : EYE;
      });
    })();

    function setError(msg) {
      if (!msg) {
        errorBox.style.display = 'none';
        errorBox.textContent = '';
        return;
      }
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setError('');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) {
        setError(t('required'));
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = t('signingIn');
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setError(data.detail || t('failed'));
          return;
        }
        if (data.user && data.user.preferred_language) {
          localStorage.setItem('aa_ui_language', data.user.preferred_language);
        }
        window.location.href = '/';
      } catch (err) {
        setError(t('connectionError') + ': ' + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = t('login');
      }
    });

    langPills.addEventListener('click', (e) => {
      const btn = e.target.closest('.lang-pill[data-lang]');
      if (!btn) return;
      applyLanguage(btn.dataset.lang, true);
    });
    applyLanguage(localStorage.getItem('aa_ui_language') || 'en', false);
  </script>
</body>
</html>
