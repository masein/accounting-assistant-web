# Production stack — pulls the pre-built image from the registry instead of
# building locally, and (unlike docker-compose.yml) does NOT bind-mount the
# source tree, so the container runs exactly what CI published.
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Configure via a .env file next to this one (see .env.prod.example). On start
# the API builds the schema and applies migrations automatically (its lifespan
# runs create_all → alembic stamp/upgrade → seed), so a fresh DB boots ready.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: accounting
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  api:
    # Pulls from GitHub Container Registry (what CI publishes to). Override the
    # exact tag with API_IMAGE in .env (e.g. pin :1.2.3 for a reproducible
    # deploy; defaults to :latest). The old docker.netixsystem.com registry is
    # only a best-effort mirror now — don't point deploys at it.
    image: ${API_IMAGE:-ghcr.io/masein/accounting-assistant-api:latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-postgres}:${DB_PASSWORD:?set DB_PASSWORD in .env}@db:5432/accounting
      APP_ENV: ${APP_ENV:-prod}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:8000}
      # Session-signing secret — REQUIRED in prod (auth tokens are signed with
      # it). Generate one: `openssl rand -hex 32`.
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      # AI provider (defaults to Metis; needs METIS_API_KEY).
      AI_PROVIDER: ${AI_PROVIDER:-metis}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_KEY_HEADER: ${AI_API_KEY_HEADER:-Authorization}
      AI_API_KEY_PREFIX: ${AI_API_KEY_PREFIX:-Bearer}
      METIS_BASE_URL: ${METIS_BASE_URL:-https://api.metisai.ir/openai/v1}
      METIS_MODEL: ${METIS_MODEL:-gpt-4o-mini}
      METIS_API_KEY: ${METIS_API_KEY:-}
      # Anthropic (Claude) — optional; used when the anthropic provider is picked.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
    ports:
      - "${API_PORT:-8000}:8000"
    labels:
      # Only this container is auto-updated by Watchtower (never the DB).
      com.centurylinklabs.watchtower.enable: "true"
    volumes:
      # Persist uploaded branding logos/stamps across image redeploys.
      - uploads:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Cold boot = DB wait + migrations + seed + WeasyPrint/font import (done in
      # the entrypoint pre-start before uvicorn serves). 60s keeps a normal slow
      # first boot from being flagged unhealthy; failures inside this window
      # don't count.
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Zero-touch deploy: polls the registry and auto-recreates the api container
  # when CI publishes a new image. LABEL_ENABLE means it only touches containers
  # labelled com.centurylinklabs.watchtower.enable=true (the api) — never the DB.
  # No inbound access from GitHub needed; the server pulls. The registry allows
  # anonymous pulls, so no registry credentials are configured here.
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"            # remove the old image after updating
      WATCHTOWER_LABEL_ENABLE: "true"       # only update labelled containers
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-120}  # seconds
      WATCHTOWER_TIMEOUT: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  pgdata:
  uploads:
